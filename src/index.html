<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SecureShell Pro</title>
    <link rel="stylesheet" href="styles/fonts.css" />
    <link rel="stylesheet" href="styles/main.css" />
    <link rel="stylesheet" href="styles/titlebar.css" />
    <link rel="stylesheet" href="styles/sidebar.css" />
    <link rel="stylesheet" href="styles/hosts.css" />
    <link rel="stylesheet" href="styles/commands.css" />
    <link rel="stylesheet" href="styles/keys.css" />
    <link rel="stylesheet" href="styles/settings.css" />
    <link rel="stylesheet" href="styles/components.css" />
    <link rel="stylesheet" href="styles/terminal.css" />
    <link rel="stylesheet" href="styles/vault.css" />
    <link rel="stylesheet" href="styles/sync.css" />
    <link rel="stylesheet" href="styles/sftp.css" />
    <link rel="stylesheet" href="assets/xterm/xterm.css" />
</head>
<body>
    <div id="app-shell">
    <header id="titlebar" class="titlebar">
        <div class="titlebar-drag" data-tauri-drag-region>
            <span class="titlebar-logo" aria-hidden="true">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="url(#titlebar-gold)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <defs>
                        <linearGradient id="titlebar-gold" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#facc15" />
                            <stop offset="50%" stop-color="#eab308" />
                            <stop offset="100%" stop-color="#ca8a04" />
                        </linearGradient>
                    </defs>
                    <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
                    <path d="M9 13l3-3-3-3" />
                    <path d="M12 15h3" />
                </svg>
            </span>
            <span class="titlebar-title">SecureShell Pro</span>
        </div>
        <div class="titlebar-controls">
            <button type="button" class="titlebar-btn" id="win-minimize" aria-label="Minimize">
                <svg width="12" height="12" viewBox="0 0 12 12" aria-hidden="true"><rect x="1" y="5.5" width="10" height="1" fill="currentColor"/></svg>
            </button>
            <button type="button" class="titlebar-btn" id="win-maximize" aria-label="Maximize">
                <svg class="icon-maximize" width="12" height="12" viewBox="0 0 12 12" aria-hidden="true"><rect x="1.5" y="1.5" width="9" height="9" fill="none" stroke="currentColor" stroke-width="1"/></svg>
                <svg class="icon-restore" width="12" height="12" viewBox="0 0 12 12" aria-hidden="true"><path d="M3.5 3.5h5v5H3.5z" fill="none" stroke="currentColor" stroke-width="1"/><path d="M5 1.5h5.5v5.5" fill="none" stroke="currentColor" stroke-width="1"/></svg>
            </button>
            <button type="button" class="titlebar-btn titlebar-btn-close" id="win-close" aria-label="Close">
                <svg width="12" height="12" viewBox="0 0 12 12" aria-hidden="true"><path d="M2 2l8 8M10 2L2 10" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
            </button>
        </div>
    </header>
    <div id="app">
        <!-- Sidebar Navigation -->
        <nav id="sidebar">
            <div class="sidebar-nav">
                <button class="nav-btn active" data-view="hosts" id="nav-hosts" title="Hosts">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="2" y="3" width="20" height="7" rx="2"/><rect x="2" y="14" width="20" height="7" rx="2"/><circle cx="6" cy="6.5" r="1"/><circle cx="6" cy="17.5" r="1"/></svg>
                    <span>Hosts</span>
                </button>
                <button class="nav-btn" data-view="terminal" id="nav-terminal" title="Terminal">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>
                    <span>Terminal</span>
                </button>
                <button class="nav-btn" data-view="commands" id="nav-commands" title="Snippets">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                    <span>Snippets</span>
                </button>
                <button class="nav-btn" data-view="keys" id="nav-keys" title="Keys">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/></svg>
                    <span>Keys</span>
                </button>
                <button class="nav-btn" data-view="sftp" id="nav-sftp" title="SFTP">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/><polyline points="12 11 12 17"/><polyline points="9 14 12 11 15 14"/></svg>
                    <span>SFTP</span>
                </button>
            </div>
            <div class="sidebar-bottom">
                <button class="nav-btn nav-lock" id="nav-lock" title="Lock vault">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                    <span>Lock</span>
                </button>
                <button class="nav-btn" data-view="settings" id="nav-settings" title="Settings">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
                    <span>Settings</span>
                </button>
            </div>
        </nav>

        <!-- Main Content Area -->
        <main id="main-content">
            <!-- Hosts View -->
            <div id="view-hosts" class="view active"></div>
            <!-- Terminal View -->
            <div id="view-terminal" class="view"></div>
            <!-- Commands View -->
            <div id="view-commands" class="view"></div>
            <!-- Keys View -->
            <div id="view-keys" class="view"></div>
            <!-- SFTP View -->
            <div id="view-sftp" class="view"></div>
            <!-- Settings View -->
            <div id="view-settings" class="view"></div>
        </main>
    </div>
    </div>

    <!-- Toast Container -->
    <div id="toast-container"></div>

    <script type="module" src="js/app.js"></script>
</body>
</html>
